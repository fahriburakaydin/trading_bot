active_asset: "eurusd"        # loads config/assets/{active_asset}.yaml

trading:
  capital:
    paper_account_size: 100000
    risk_per_trade_pct: 0.005       # 0.5% per trade
    max_concurrent_positions: 3
    max_daily_loss_pct: 0.03        # 3%
    max_notional_pct: 0.20          # max 20% of portfolio in one trade
  hours:
    days: [Mon, Tue, Wed, Thu, Fri, Sat, Sun]
    start_hour: 0
    end_hour: 24
    timezone: "Europe/Istanbul"
  price_monitor:
    poll_interval_seconds: 30
    alarm_expiry_hours: 48
    trigger_tolerance_pct: 0.003    # 0.3% — must stay within this for 2 polls
    queue_max_size: 10
  orders:
    type: "limit"                   # limit | market
    max_slippage_pct: 0.005         # 0.5%
    sl_type: "stop_limit"
    sl_limit_offset_pct: 0.002      # 0.2%
    trail_stop: false

schedule:
  research:
    hour: 10
    minute: 0
    timezone: "Europe/Istanbul"
  analyst:
    hour: 10
    minute: 30
    timezone: "Europe/Istanbul"
  evaluator:
    day_of_week: "sun"
    hour: 20
    timezone: "Europe/Istanbul"

llm:
  provider: "ollama"                # ollama | anthropic | openai
  model: "qwen3:14b"               # global default for all agents
  base_url: "http://localhost:11434"
  temperature: 0.1
  max_tokens: 4096

# Per-agent overrides — comment out any section to use the global llm default
agents:
  research:
    provider: "ollama"
    model: "qwen3:14b"             # news extraction — lighter model is fine
    base_url: "http://localhost:11434"
    temperature: 0.1
    max_tokens: 4096
  analyst:
    provider: "ollama"
    model: "qwen2.5:32b"           # qwen3:14b runs extended thinking by default — too slow
    base_url: "http://localhost:11434"
    temperature: 0.1
    max_tokens: 4096
  trader:
    provider: "ollama"
    model: "qwen2.5:32b"           # deterministic JSON execution — no thinking mode needed
    base_url: "http://localhost:11434"
    temperature: 0.0               # deterministic for order execution
    max_tokens: 4096
  evaluator:
    provider: "ollama"
    model: "qwen2.5:32b"             # weekly reflection — cheapest model acceptable
    base_url: "http://localhost:11434"
    temperature: 0.2               # slightly more creative for reflection
    max_tokens: 8192

ibkr:
  host: "127.0.0.1"
  port: 7497                        # 7497=paper, 7496=live
  client_id: 2
  reconnect_attempts: 10
  reconnect_backoff_base: 5         # seconds

risk:
  appetite: "moderate"              # conservative | moderate | aggressive
  min_confidence: 0.65
  min_risk_reward: 1.5

indicators:
  rsi_period: 14
  macd_fast: 12
  macd_slow: 26
  macd_signal: 9
  ema_periods: [20, 50, 200]
  vwap_session: true
  volume_profile_sessions: 20
  atr_period: 14

search:
  primary: "brave"                  # brave | duckduckgo
  fallback: "duckduckgo"
  max_results: 10

dashboard:
  port: 8501
  auto_refresh_seconds: 30

logging:
  level: "INFO"                     # DEBUG | INFO | WARNING | ERROR
  rotation: "10 MB"
  retention: "30 days"
